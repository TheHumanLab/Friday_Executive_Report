<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MRH Tanzania | Friday Executive Brief</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
    :root {
        --color-bg: #0B0E14;
        --color-surface: #11151D;
        --color-surface-hover: #161B25;
        --color-border: #1F2430;
        --color-gold: #D4AF37;
        --color-gold-muted: rgba(212, 175, 55, 0.15);
        --color-text: #FFFFFF;
        --color-text-muted: #8A92A6;
    }
    
    * {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    
    body {
        background: var(--color-bg);
        color: var(--color-text);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
    }
    
    .gold-glow {
        box-shadow: 0 0 0 1px var(--color-gold-muted), 0 8px 24px -8px rgba(212, 175, 55, 0.25);
    }
    
    .gold-text {
        color: var(--color-gold);
    }
    
    .surface {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
    }
    
    .surface-hover:hover {
        background: var(--color-surface-hover);
        border-color: rgba(212, 175, 55, 0.3);
        transform: translateY(-2px);
    }
    
    .btn-gold {
        background: linear-gradient(135deg, var(--color-gold) 0%, #BF9B30 100%);
        color: var(--color-bg);
        font-weight: 600;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .btn-gold:hover {
        box-shadow: 0 8px 24px -6px rgba(212, 175, 55, 0.4);
        transform: translateY(-1px);
    }
    
    .btn-gold:disabled {
        background: var(--color-surface);
        color: var(--color-text-muted);
        cursor: not-allowed;
        transform: none;
    }
    
    .fade-in {
        animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        opacity: 0;
    }
    
    @keyframes fadeIn {
        to { opacity: 1; }
    }
    
    .stagger-1 { animation-delay: 0.1s; }
    .stagger-2 { animation-delay: 0.2s; }
    .stagger-3 { animation-delay: 0.3s; }
    .stagger-4 { animation-delay: 0.4s; }
    
    .admin-dropzone {
        border: 2px dashed var(--color-border);
        transition: all 0.3s ease;
    }
    
    .admin-dropzone.dragover {
        border-color: var(--color-gold);
        background: var(--color-gold-muted);
    }
    
    textarea {
        resize: vertical;
        min-height: 120px;
    }
    
    .bullet-gold::before {
        content: '';
        display: inline-block;
        width: 6px;
        height: 6px;
        background: var(--color-gold);
        border-radius: 50%;
        margin-right: 12px;
        flex-shrink: 0;
        margin-top: 8px;
    }
    
    @media print {
        .no-print { display: none !important; }
        body { background: white; color: black; }
    }
</style>
</head>
<body class="min-h-screen">
<div id="app"></div>

<script>
const CONFIG = {
    PIN: 'MRH2026',
    GITHUB_REPO: 'thehumanlab/Friday_Executive_Report',
    GITHUB_BRANCH: 'main',
    FILES: {
        overview: '/public/overview.txt',
        nextWeek: '/public/next-week.txt',
        docs: [
            { name: 'Executive Action Summary', path: '/public/documents/weekly-executive-action-summary.pdf' },
            { name: 'Operational Diagnostic Report', path: '/public/documents/operational-diagnostic-report.pdf' },
            { name: 'Supporting Analysis', path: '/public/documents/weekly-supporting-analysis.pdf' }
        ]
    },
    OBSERVATIONS: [
        { title: 'Strategic Direction', text: 'Cross-department alignment is being restructured with clearer accountability paths to eliminate initiative overlap and delayed approvals.' },
        { title: 'Team Capacity', text: 'Current structures require redesign to match upcoming Odoo modules. Skills mapping and responsibility clarification remain critical.' },
        { title: 'Leadership Performance', text: 'Managers are transitioning to measurable KPIs; consistent reporting cadences are being established for operational visibility.' },
        { title: 'Systems Integration', text: 'Real-time financial and operational dashboards are under development to replace fragmented reporting cycles.' },
        { title: 'Operational Ownership', text: 'Clarity between sales, operations, and finance workflows is being defined to strengthen handoffs and reduce blockers.' },
        { title: 'Compliance Framework', text: 'Policy implementation and departmental adherence tracking are being reinforced through automated checks.' },
        { title: 'Workflow Gaps', text: 'Dependencies between approvals, reporting, and inventory workflows are being mapped to remove systemic bottlenecks.' },
        { title: 'Scalability Readiness', text: 'The organization demonstrates strong long-term growth potential; however, sustainable scale will depend on strengthening operational governance, systems visibility, and execution standardization.' }
    ],
    DEFAULT_OVERVIEW: `This week's diagnostic assessment reveals structural misalignments in reporting lines, delayed approvals, and inconsistent operational data flows across departments. Initial findings indicate opportunities for enhanced governance frameworks and execution transparency. The transition to Odoo ERP continues as a strategic priority, with focus on departmental standardization and workflow automation to support the organization's growth trajectory.`,
    DEFAULT_NEXT_WEEK: [
        'Approval framework refinement',
        'CRM deployment alignment',
        'Department reporting standardization',
        'Workflow visibility implementation',
        'Odoo process configuration continuation'
    ]
};

const state = {
    isAdmin: false,
    authenticated: false,
    overview: CONFIG.DEFAULT_OVERVIEW,
    nextWeek: [...CONFIG.DEFAULT_NEXT_WEEK],
    documentStatus: [false, false, false],
    githubToken: localStorage.getItem('mrh_github_token') || '',
    files: {
        overview: '',
        nextWeek: '',
        docs: [null, null, null]
    }
};

function getFridayDate() {
    const today = new Date();
    const day = today.getDay();
    const diff = day >= 5 ? day - 5 : day + 2;
    const friday = new Date(today);
    friday.setDate(today.getDate() - diff);
    
    const options = { month: 'short', day: 'numeric', year: 'numeric' };
    const dateStr = friday.toLocaleDateString('en-US', options);
    
    const startOfYear = new Date(friday.getFullYear(), 0, 1);
    const weekNum = Math.ceil(((friday - startOfYear) / 86400000 + startOfYear.getDay() + 1) / 7);
    
    return { date: dateStr, week: weekNum };
}

function initIcons() {
    if (typeof lucide !== 'undefined') {
        lucide.createIcons();
    } else {
        // Fallback if CDN fails
        setTimeout(initIcons, 100);
    }
}

async function fetchText(url, fallback) {
    try {
        const res = await fetch(url + '?t=' + Date.now());
        if (!res.ok) throw new Error('Not found');
        return await res.text();
    } catch {
        return fallback;
    }
}

async function checkDocument(url) {
    try {
        const res = await fetch(url, { method: 'HEAD' });
        return res.ok;
    } catch {
        return false;
    }
}

async function loadData() {
    const [overview, nextWeek] = await Promise.all([
        fetchText(CONFIG.FILES.overview, CONFIG.DEFAULT_OVERVIEW),
        fetchText(CONFIG.FILES.nextWeek, CONFIG.DEFAULT_NEXT_WEEK.join('\n'))
    ]);
    
    state.overview = overview.trim();
    state.nextWeek = nextWeek.split('\n').filter(l => l.trim()).map(l => l.replace(/^[-•]\s*/, ''));
    
    const docChecks = await Promise.all(
        CONFIG.FILES.docs.map(doc => checkDocument(doc.path))
    );
    state.documentStatus = docChecks;
    
    render();
}

function render() {
    const { date, week } = getFridayDate();
    const app = document.getElementById('app');
    
    app.innerHTML = `
        ${state.isAdmin && !state.authenticated ? renderPinGate() : ''}
        ${!state.isAdmin || state.authenticated ? renderDashboard(date, week) : ''}
    `;
    
    initIcons();
    attachEventListeners();
}

function renderPinGate() {
    return `
        <div class="min-h-screen flex items-center justify-center p-4">
            <div class="surface rounded-2xl p-8 max-w-md w-full fade-in">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-10 h-10 rounded-lg bg-white/5 flex items-center justify-center">
                        <i data-lucide="lock" class="w-5 h-5 gold-text"></i>
                    </div>
                    <h2 class="text-xl font-semibold">Admin Access</h2>
                </div>
                <input 
                    type="password" 
                    id="pin-input" 
                    placeholder="Enter PIN" 
                    class="w-full bg-transparent border border-white/10 rounded-lg px-4 py-3 mb-4 focus:outline-none focus:border-[var(--color-gold)] transition-colors"
                    autofocus
                />
                <button id="pin-submit" class="btn-gold w-full py-3 rounded-lg">
                    Authenticate
                </button>
                <p id="pin-error" class="text-red-400 text-sm mt-3 hidden">Invalid PIN. Try again.</p>
                <a href="/" class="block text-center text-sm text-white/40 hover:text-white/60 mt-6 transition-colors">
                    Return to Brief
                </a>
            </div>
        </div>
    `;
}

function renderDashboard(date, week) {
    return `
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 lg:py-12">
            ${renderHeader(date, week)}
            ${state.isAdmin ? renderAdminPanel() : renderBrief()}
            ${renderFooter()}
        </div>
    `;
}

function renderHeader(date, week) {
    return `
        <header class="mb-12 lg:mb-16 fade-in">
            <div class="flex flex-col lg:flex-row lg:items-start lg:justify-between gap-6 pb-8 border-b border-white/5">
                <div>
                    <h1 class="text-3xl lg:text-4xl font-bold tracking-tight mb-2">MRH TANZANIA</h1>
                    <p class="text-lg text-white/60">FRIDAY EXECUTIVE BRIEF</p>
                    <p class="text-sm text-white/40 mt-2">Operational Governance & Systems Transition Overview</p>
                </div>
                <div class="text-left lg:text-right">
                    <div class="inline-flex items-center gap-2 px-4 py-2 rounded-lg bg-white/5 border border-white/10 mb-3">
                        <i data-lucide="calendar" class="w-4 h-4 text-white/60"></i>
                        <span class="text-sm font-medium">Week ${week} • ${date}</span>
                    </div>
                    <p class="text-xs text-white/40 leading-relaxed">
                        Prepared by: KJ<br>
                        Chief Operating Officer<br>
                        <span class="gold-text font-medium">Confidential Executive Brief</span>
                    </p>
                </div>
            </div>
        </header>
    `;
}

function renderBrief() {
    return `
        ${renderOverview()}
        ${renderObservations()}
        ${renderDocuments()}
        ${renderNextWeek()}
    `;
}

function renderOverview() {
    return `
        <section class="mb-12 fade-in stagger-1">
            <div class="flex items-center gap-3 mb-6">
                <div class="w-1 h-6 bg-gradient-to-b from-[var(--color-gold)] to-transparent rounded-full"></div>
                <h2 class="text-xl font-semibold tracking-tight">THIS WEEK'S OVERVIEW</h2>
            </div>
            <div class="surface rounded-2xl p-6 lg:p-8 gold-glow">
                <p class="text-base lg:text-lg leading-relaxed text-white/90 whitespace-pre-line">${state.overview}</p>
            </div>
        </section>
    `;
}

function renderObservations() {
    return `
        <section class="mb-12 fade-in stagger-2">
            <div class="flex items-center gap-3 mb-6">
                <div class="w-1 h-6 bg-gradient-to-b from-[var(--color-gold)] to-transparent rounded-full"></div>
                <h2 class="text-xl font-semibold tracking-tight">KEY OPERATIONAL OBSERVATIONS</h2>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                ${CONFIG.OBSERVATIONS.map((obs, i) => `
                    <div class="surface surface-hover rounded-xl p-6 transition-all duration-300">
                        <div class="flex items-start gap-3">
                            <div class="w-8 h-8 rounded-lg bg-white/5 flex items-center justify-center flex-shrink-0 mt-0.5">
                                <div class="w-2 h-2 rounded-full bg-[var(--color-gold)]"></div>
                            </div>
                            <div>
                                <h3 class="font-semibold text-sm mb-2 text-white/90">${obs.title}</h3>
                                <p class="text-sm text-white/60 leading-relaxed">${obs.text}</p>
                            </div>
                        </div>
                    </div>
                `).join('')}
            </div>
        </section>
    `;
}

function renderDocuments() {
    return `
        <section class="mb-12 fade-in stagger-3">
            <div class="flex items-center gap-3 mb-6">
                <div class="w-1 h-6 bg-gradient-to-b from-[var(--color-gold)] to-transparent rounded-full"></div>
                <h2 class="text-xl font-semibold tracking-tight">WEEKLY DOCUMENTS</h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                ${CONFIG.FILES.docs.map((doc, i) => {
                    const available = state.documentStatus[i];
                    return `
                        <${available ? `a href="${doc.path}" target="_blank"` : 'div'} 
                            class="surface ${available ? 'surface-hover cursor-pointer' : ''} rounded-xl p-6 transition-all duration-300 group"
                        >
                            <div class="flex items-start justify-between mb-4">
                                <div class="w-12 h-12 rounded-lg ${available ? 'bg-[var(--color-gold-muted)]' : 'bg-white/5'} flex items-center justify-center">
                                    <i data-lucide="file-text" class="w-6 h-6 ${available ? 'gold-text' : 'text-white/40'}"></i>
                                </div>
                                ${available ? `
                                    <i data-lucide="external-link" class="w-4 h-4 text-white/40 group-hover:text-[var(--color-gold)] transition-colors"></i>
                                ` : ''}
                            </div>
                            <h3 class="font-semibold mb-2 text-sm lg:text-base">${doc.name}</h3>
                            ${available ? `
                                <p class="text-xs text-white/40">Click to open PDF</p>
                            ` : `
                                <p class="text-xs gold-text font-medium">Available Upon Release</p>
                            `}
                        </${available ? 'a' : 'div'}>
                    `;
                }).join('')}
            </div>
        </section>
    `;
}

function renderNextWeek() {
    return `
        <section class="mb-12 fade-in stagger-4">
            <div class="flex items-center gap-3 mb-6">
                <div class="w-1 h-6 bg-gradient-to-b from-[var(--color-gold)] to-transparent rounded-full"></div>
                <h2 class="text-xl font-semibold tracking-tight">NEXT WEEK PRIORITIES</h2>
            </div>
            <div class="surface rounded-2xl p-6 lg:p-8">
                <ul class="space-y-3">
                    ${state.nextWeek.map(item => `
                        <li class="flex items-start text-sm lg:text-base text-white/80">
                            <span class="bullet-gold flex items-start w-full">${item}</span>
                        </li>
                    `).join('')}
                </ul>
            </div>
        </section>
    `;
}

function renderAdminPanel() {
    return `
        <div class="space-y-8 mb-12">
            <div class="flex items-center justify-between pb-6 border-b border-white/5">
                <div>
                    <h2 class="text-2xl font-semibold mb-1">Admin Control Panel</h2>
                    <p class="text-sm text-white/40">Edit content and upload documents for Friday's brief</p>
                </div>
                <button id="exit-admin" class="px-4 py-2 rounded-lg surface hover:bg-white/5 transition-colors text-sm">
                    Exit Admin
                </button>
            </div>
            
            ${renderGithubTokenInput()}
            
            <div class="surface rounded-2xl p-6 lg:p-8">
                <label class="block text-sm font-semibold mb-3 text-white/90">THIS WEEK'S OVERVIEW</label>
                <textarea 
                    id="edit-overview" 
                    class="w-full bg-transparent border border-white/10 rounded-lg px-4 py-3 focus:outline-none focus:border-[var(--color-gold)] transition-colors text-sm leading-relaxed"
                    rows="6"
                >${state.overview}</textarea>
            </div>
            
            <div class="surface rounded-2xl p-6 lg:p-8">
                <label class="block text-sm font-semibold mb-3 text-white/90">NEXT WEEK PRIORITIES</label>
                <textarea 
                    id="edit-nextweek" 
                    class="w-full bg-transparent border border-white/10 rounded-lg px-4 py-3 focus:outline-none focus:border-[var(--color-gold)] transition-colors text-sm"
                    rows="5"
                >${state.nextWeek.join('\n')}</textarea>
                <p class="text-xs text-white/40 mt-2">One priority per line</p>
            </div>
            
            <div class="surface rounded-2xl p-6 lg:p-8">
                <h3 class="text-sm font-semibold mb-4 text-white/90">UPLOAD DOCUMENTS</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    ${CONFIG.FILES.docs.map((doc, i) => `
                        <div class="admin-dropzone rounded-xl p-6 text-center" data-doc-index="${i}">
                            <i data-lucide="upload-cloud" class="w-8 h-8 text-white/40 mx-auto mb-3"></i>
                            <p class="text-xs font-medium mb-1">${doc.name}</p>
                            <p class="text-xs text-white/40 mb-3">${state.files.docs[i] ? state.files.docs[i].name : 'No file selected'}</p>
                            <input type="file" accept=".pdf" class="hidden" id="file-${i}">
                            <button onclick="document.getElementById('file-${i}').click()" class="px-4 py-2 rounded-lg bg-white/5 hover:bg-white/10 transition-colors text-xs w-full">
                                Select PDF
                            </button>
                        </div>
                    `).join('')}
                </div>
            </div>
            
            <div class="flex gap-4">
                <button id="save-publish" class="btn-gold px-8 py-3 rounded-lg flex-1">
                    Save & Publish to GitHub
                </button>
            </div>
            
            <div id="admin-status" class="hidden surface rounded-xl p-4 text-sm"></div>
        </div>
    `;
}

function renderGithubTokenInput() {
    return `
        <div class="surface rounded-2xl p-6 lg:p-8">
            <label class="block text-sm font-semibold mb-3 text-white/90">GitHub Personal Access Token</label>
            <input 
                type="password" 
                id="github-token" 
                value="${state.githubToken}"
                placeholder="ghp_..." 
                class="w-full bg-transparent border border-white/10 rounded-lg px-4 py-3 focus:outline-none focus:border-[var(--color-gold)] transition-colors text-sm font-mono"
            />
            <p class="text-xs text-white/40 mt-2">Required for publishing. Token needs repo write access. <a href="https://github.com/settings/tokens/new" target="_blank" class="gold-text hover:underline">Generate token</a></p>
        </div>
    `;
}

function renderFooter() {
    return `
        <footer class="pt-12 mt-16 border-t border-white/5">
            <div class="text-center">
                <p class="text-xs text-white/40 tracking-wider uppercase">Confidential Internal Executive Brief — MRH Tanzania</p>
            </div>
        </footer>
    `;
}

function attachEventListeners() {
    const pinSubmit = document.getElementById('pin-submit');
    const pinInput = document.getElementById('pin-input');
    
    if (pinSubmit) {
        pinSubmit.addEventListener('click', handlePinSubmit);
        pinInput.addEventListener('keypress', e => {
            if (e.key === 'Enter') handlePinSubmit();
        });
    }
    
    const exitAdmin = document.getElementById('exit-admin');
    if (exitAdmin) {
        exitAdmin.addEventListener('click', () => {
            state.isAdmin = false;
            state.authenticated = false;
            window.history.pushState({}, '', '/');
            render();
        });
    }
    
    const savePublish = document.getElementById('save-publish');
    if (savePublish) {
        savePublish.addEventListener('click', handleSavePublish);
    }
    
    const tokenInput = document.getElementById('github-token');
    if (tokenInput) {
        tokenInput.addEventListener('change', e => {
            state.githubToken = e.target.value;
            localStorage.setItem('mrh_github_token', e.target.value);
        });
    }
    
    document.querySelectorAll('[data-doc-index]').forEach(zone => {
        const index = parseInt(zone.dataset.docIndex);
        const input = document.getElementById(`file-${index}`);
        
        input.addEventListener('change', e => {
            if (e.target.files[0]) {
                state.files.docs[index] = e.target.files[0];
                render();
            }
        });
        
        zone.addEventListener('dragover', e => {
            e.preventDefault();
            zone.classList.add('dragover');
        });
        
        zone.addEventListener('dragleave', () => {
            zone.classList.remove('dragover');
        });
        
        zone.addEventListener('drop', e => {
            e.preventDefault();
            zone.classList.remove('dragover');
            if (e.dataTransfer.files[0] && e.dataTransfer.files[0].type === 'application/pdf') {
                state.files.docs[index] = e.dataTransfer.files[0];
                render();
            }
        });
    });
}

function handlePinSubmit() {
    const input = document.getElementById('pin-input');
    const error = document.getElementById('pin-error');
    
    if (input.value === CONFIG.PIN) {
        state.authenticated = true;
        render();
    } else {
        error.classList.remove('hidden');
        input.value = '';
        input.focus();
    }
}

async function handleSavePublish() {
    const status = document.getElementById('admin-status');
    status.classList.remove('hidden');
    
    if (!state.githubToken) {
        status.innerHTML = '<span class="text-red-400">Error: GitHub token required</span>';
        return;
    }
    
    status.innerHTML = '<span class="text-white/60">Publishing to GitHub...</span>';
    
    try {
        const overviewText = document.getElementById('edit-overview').value;
        const nextWeekText = document.getElementById('edit-nextweek').value;
        
        const files = [
            { path: 'public/overview.txt', content: btoa(unescape(encodeURIComponent(overviewText))) },
            { path: 'public/next-week.txt', content: btoa(unescape(encodeURIComponent(nextWeekText))) }
        ];
        
        for (let i = 0; i < state.files.docs.length; i++) {
            if (state.files.docs[i]) {
                const base64 = await fileToBase64(state.files.docs[i]);
                files.push({
                    path: CONFIG.FILES.docs[i].path.substring(1),
                    content: base64
                });
            }
        }
        
        for (const file of files) {
            await commitToGithub(file.path, file.content);
        }
        
        status.innerHTML = '<span class="text-green-400">Successfully published! Changes are live.</span>';
        setTimeout(() => {
            state.files.docs = [null, null, null];
            loadData();
        }, 2000);
        
    } catch (err) {
        status.innerHTML = `<span class="text-red-400">Error: ${err.message}</span>`;
    }
}

function fileToBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
    });
}

async function commitToGithub(path, content) {
    const url = `https://api.github.com/repos/${CONFIG.GITHUB_REPO}/contents/${path}`;
    
    let sha = null;
    try {
        const existing = await fetch(url, {
            headers: { Authorization: `token ${state.githubToken}` }
        });
        if (existing.ok) {
            const data = await existing.json();
            sha = data.sha;
        }
    } catch {}
    
    const body = {
        message: `Update ${path} via Friday Executive Brief admin`,
        content: content,
        branch: CONFIG.GITHUB_BRANCH
    };
    if (sha) body.sha = sha;
    
    const res = await fetch(url, {
        method: 'PUT',
        headers: {
            Authorization: `token ${state.githubToken}`,
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
    });
    
    if (!res.ok) {
        const err = await res.json();
        throw new Error(err.message || 'GitHub API error');
    }
}

function checkAdminMode() {
    const params = new URLSearchParams(window.location.search);
    const path = window.location.pathname;
    if (params.get('admin') === 'true' || path === '/admin' || path.includes('admin')) {
        state.isAdmin = true;
    }
}

function init() {
    checkAdminMode();
    loadData();
}

init();
